name: Deploy to AWS App Runner

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy-rails:
    name: Build & Deploy Rails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Rails image
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.RAILS_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./my-rails-api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build-rails

      - name: Deploy Rails to App Runner
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.RAILS_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          aws apprunner update-service \
            --service-arn ${{ secrets.RAILS_SERVICE_ARN }} \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "80",
                  "RuntimeEnvironmentVariables": {
                    "DATABASE_URL":          "${{ secrets.DATABASE_URL }}",
                    "SECRET_KEY_BASE":       "${{ secrets.SECRET_KEY_BASE }}",
                    "GOOGLE_CLIENT_ID":      "${{ secrets.GOOGLE_CLIENT_ID }}",
                    "GOOGLE_CLIENT_SECRET":  "${{ secrets.GOOGLE_CLIENT_SECRET }}",
                    "FRONTEND_URL":          "${{ secrets.FRONTEND_URL }}",
                    "RAILS_ENV":             "production"
                  }
                }
              },
              "AuthenticationConfiguration": {
                "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
              }
            }'

      - name: Wait for Rails deployment
        run: |
          aws apprunner wait service-updated \
            --service-arn ${{ secrets.RAILS_SERVICE_ARN }}

  deploy-next:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    needs: deploy-rails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Next.js image
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.NEXT_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_RAILS_API_URL=${{ secrets.NEXT_PUBLIC_RAILS_API_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./my-next-app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy Next.js to App Runner
        env:
          ECR_REGISTRY:   ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.NEXT_ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          aws apprunner update-service \
            --service-arn ${{ secrets.NEXT_SERVICE_ARN }} \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "3000",
                  "RuntimeEnvironmentVariables": {
                    "RAILS_API_URL": "${{ secrets.RAILS_API_URL }}"
                  }
                }
              },
              "AuthenticationConfiguration": {
                "AccessRoleArn": "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}"
              }
            }'

      - name: Wait for Next.js deployment
        run: |
          aws apprunner wait service-updated \
            --service-arn ${{ secrets.NEXT_SERVICE_ARN }}
